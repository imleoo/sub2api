name: Docker CI/CD

on:
  push:
    branches:
      - zhiguofan
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Docker Registry
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY || 'harbor-test.brainwm.com:21143' }}
          DOCKER_NAMESPACE: ${{ vars.DOCKER_NAMESPACE || 'infra' }}
          DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || 'test_uds_backend' }}
        run: |
          echo "DOCKER_REGISTRY=${DOCKER_REGISTRY}" >> "$GITHUB_ENV"
          echo "DOCKER_IMAGE_PATH=${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/${DOCKER_IMAGE}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME || 'builder' }}
          password: ${{ secrets.DOCKERHUB_TOKEN || 'eqmBnPZhcrL12wwO' }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_PATH }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'zhiguofan') }}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=latest
            COMMIT=${{ github.sha }}
            DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
